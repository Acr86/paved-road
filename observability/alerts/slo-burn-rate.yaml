# Multi-window burn-rate alerting for the fx-rates availability SLO
# (99.5% over 30 days — see docs/slo.md). Two alerts, not ten: a fast burn
# that pages and a slow burn that opens a ticket. Both windows must agree,
# which is what keeps this quiet during blips — alerting on error budget
# spend instead of raw error rate is the noise-reduction strategy.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-fx-rates
spec:
  groups:
    - name: slo.fx-rates.availability
      rules:
        - alert: FxRatesFastBurn
          # 14.4x budget burn: exhausts 2% of the 30-day budget in one hour.
          expr: |
            (
              sum(rate(http_requests_total{service="fx-rates", status=~"5.."}[5m]))
              / sum(rate(http_requests_total{service="fx-rates"}[5m]))
            ) > (14.4 * 0.005)
            and
            (
              sum(rate(http_requests_total{service="fx-rates", status=~"5.."}[1h]))
              / sum(rate(http_requests_total{service="fx-rates"}[1h]))
            ) > (14.4 * 0.005)
          for: 2m
          labels:
            severity: page
            service: fx-rates
          annotations:
            summary: fx-rates is burning its error budget 14x too fast
            runbook_url: https://github.com/Acr86/paved-road/blob/main/docs/runbooks/rb-002-fast-burn-slo.md

        - alert: FxRatesSlowBurn
          # 6x burn: budget gone in ~5 days if sustained. Ticket, not page.
          expr: |
            (
              sum(rate(http_requests_total{service="fx-rates", status=~"5.."}[30m]))
              / sum(rate(http_requests_total{service="fx-rates"}[30m]))
            ) > (6 * 0.005)
            and
            (
              sum(rate(http_requests_total{service="fx-rates", status=~"5.."}[6h]))
              / sum(rate(http_requests_total{service="fx-rates"}[6h]))
            ) > (6 * 0.005)
          for: 15m
          labels:
            severity: ticket
            service: fx-rates
          annotations:
            summary: fx-rates is burning its error budget 6x too fast
            runbook_url: https://github.com/Acr86/paved-road/blob/main/docs/runbooks/rb-002-fast-burn-slo.md

        - alert: FxRatesP95LatencyHigh
          # The latency SLO is p95 < 300ms (docs/slo.md).
          expr: |
            histogram_quantile(0.95,
              sum by (le) (rate(http_request_duration_seconds_bucket{service="fx-rates"}[5m]))
            ) > 0.3
          for: 10m
          labels:
            severity: ticket
            service: fx-rates
          annotations:
            summary: fx-rates p95 latency exceeds the 300ms objective
            runbook_url: https://github.com/Acr86/paved-road/blob/main/docs/runbooks/rb-002-fast-burn-slo.md
