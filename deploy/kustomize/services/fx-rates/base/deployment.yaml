apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-rates
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fx-rates
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fx-rates
      annotations:
        # Annotation-based scrape discovery: services stay CRD-free, so the
        # core platform runs even when the observability stack is not installed.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ghcr.io/acr86/paved-road/fx-rates:latest
          # The deployed tags are moving pointers advanced by digest
          # promotion; without Always, a node's cached image silently
          # outlives the release that superseded it.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: fx-rates
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
