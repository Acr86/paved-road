# Render the README demo GIF from docs/demo/golden-path.tape. vhs needs ttyd,
# which is a Linux/macOS tool — so the recording is produced here rather than
# on a contributor's machine, and the .tape (not the binary GIF) is the
# reviewable source of truth. Manual trigger: the demo changes rarely.
name: demo

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      VHS_VERSION: "0.11.0"
      TTYD_VERSION: "1.7.7"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: "platform-cli/uv.lock"

      - name: Install the CLI as a real command (so the recording shows `platform ...`)
        run: uv tool install ./platform-cli

      - name: Install vhs, ttyd and ffmpeg (pinned; the action's installer is flaky)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          sudo curl -fsSL "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64" -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz" | tar xz -C "$tmp"
          sudo install "$(find "$tmp" -name vhs -type f | head -n1)" /usr/local/bin/vhs
          vhs --version && ttyd --version && ffmpeg -version | head -n1

      - name: Render the tape
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          vhs docs/demo/golden-path.tape

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: golden-path-gif
          path: docs/demo/golden-path.gif
          if-no-files-found: error
